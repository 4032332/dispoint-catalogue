name: Weekly catalogue sourcing

on:
  schedule:
    # Sunday 20:00 UTC
    - cron: "0 20 * * 0"
  workflow_dispatch: {}

jobs:
  source-catalogue:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install anthropic defusedxml

      - name: Fetch candidates
        run: python3 catalogue/pipeline/fetch.py > /tmp/raw_candidates.json

      - name: Normalize candidates via Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 catalogue/pipeline/normalize.py < /tmp/raw_candidates.json > /tmp/normalized.json

      - name: Dedupe against live catalogue
        run: |
          python3 catalogue/pipeline/dedupe_merge.py \
            --catalogue catalogue/catalogue.json \
            --candidates /tmp/normalized.json \
            > /tmp/new_candidates.json

      - name: Roll catalogue (drop expired, fold in new, cap at 10)
        run: |
          python3 catalogue/pipeline/roll_catalogue.py \
            --catalogue catalogue/catalogue.json \
            --candidates /tmp/new_candidates.json \
            --target 10 \
            --out catalogue/catalogue.json \
            --render-out /tmp/rolled_render.json

      - name: Check whether the catalogue changed
        id: check
        run: |
          if git diff --quiet -- catalogue/catalogue.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
          echo "count=$(python3 -c "import json;print(len(json.load(open('catalogue/catalogue.json'))))")" >> "$GITHUB_OUTPUT"

      - name: Validate rolled catalogue
        if: steps.check.outputs.changed == 'true'
        run: python3 catalogue/pipeline/validate.py catalogue/catalogue.json

      - name: Render PR body
        if: steps.check.outputs.changed == 'true'
        run: python3 catalogue/pipeline/render_pr.py /tmp/rolled_render.json > /tmp/pr_body.md

      - name: Create Pull Request
        if: steps.check.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "catalogue: weekly sourcing run"
          branch: catalogue/weekly-update
          delete-branch: true
          title: "Weekly catalogue update (${{ steps.check.outputs.count }} promos this week)"
          body-path: /tmp/pr_body.md
          add-paths: catalogue/catalogue.json
          # Request the maintainer as reviewer so GitHub sends a weekly "review requested"
          # notification and the PR sits in their review queue until actioned.
          reviewers: 4032332
